<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Euribor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<style>
body {
    margin: 0;
    background: #0f1115;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
 
.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}
 
h1 {
    text-align: center;
    margin-bottom: 10px;
}
 
.updated {
    text-align: center;
    color: #aaa;
    font-size: 14px;
    margin-bottom: 20px;
}
 
.card {
    background: #1a1d23;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
 
.term {
    font-size: 18px;
}
 
.value {
    font-size: 22px;
    font-weight: bold;
}
 
.up {
    color: #ff3b30;
}
 
.down {
    color: #30d158;
}
 
.same {
    color: #aaa;
}
</style>
</head>
 
<body>
<div class="container">
    <h1>Euribor</h1>
    <div class="updated" id="updated">Päivitetään…</div>
 
    <div class="card">
        <div class="term">1 kk</div>
        <div class="value" id="e1">–</div>
    </div>
 
    <div class="card">
        <div class="term">3 kk</div>
        <div class="value" id="e3">–</div>
    </div>
 
    <div class="card">
        <div class="term">6 kk</div>
        <div class="value" id="e6">–</div>
    </div>
 
    <div class="card">
        <div class="term">12 kk</div>
        <div class="value" id="e12">–</div>
    </div>
</div>
 
<script>
// Apufunktio nuolelle ja värille
function format(value, prev) {
    const diff = value - prev;
    let cls = "same";
    let arrow = "➖";
 
    if (diff > 0.0001) {
        cls = "up";
        arrow = "▲";
    } else if (diff < -0.0001) {
        cls = "down";
        arrow = "▼";
    }
 
    return `<span class="${cls}">${value.toFixed(3)} % ${arrow}</span>`;
}
 
// Hae data (välipalvelu käyttää ECB:n virallisia lukuja)
fetch("https://euribornow.com/api/latest?history=1")
  .then(r => r.json())
  .then(data => {
      document.getElementById("updated").textContent =
        "Päivitetty: " + data.date;
 
      document.getElementById("e1").innerHTML =
        format(data["1M"].rate, data["1M"].prev);
 
      document.getElementById("e3").innerHTML =
        format(data["3M"].rate, data["3M"].prev);
 
      document.getElementById("e6").innerHTML =
        format(data["6M"].rate, data["6M"].prev);
 
      document.getElementById("e12").innerHTML =
        format(data["12M"].rate, data["12M"].prev);
  })
  .catch(() => {
      document.getElementById("updated").textContent =
        "Tietojen haku epäonnistui";
  });
</script>
</body>
</html>
