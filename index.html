<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Euribor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .row { margin: 8px 0; font-size: 18px; }
    .muted { color: #666; font-size: 14px; margin-top: 10px; }
    button { padding: 8px 12px; }
    code { background: #f2f2f2; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
 
  <h2>Euribor (1kk / 3kk / 6kk / 12kk)</h2>
 
  <button id="refresh">Päivitä</button>
  <label style="margin-left:10px;">
    <input type="checkbox" id="nocache"> Ohita välimuisti
  </label>
 
  <div class="row">Päivämäärä: <b id="date">—</b></div>
  <div class="row">1 kk: <b id="v1m">—</b> %</div>
  <div class="row">3 kk: <b id="v3m">—</b> %</div>
  <div class="row">6 kk: <b id="v6m">—</b> %</div>
  <div class="row">12 kk: <b id="v12m">—</b> %</div>
 
  <div class="muted">Status: <span id="status">—</span></div>
  <div class="muted">API: <code id="api">—</code></div>
 
  <script>
    // ✅ TÄSSÄ se rivi on. Vaihda tarvittaessa.
    const API_URL = "https://euribor-api.mrvaitsa.workers.dev/";
 
    const fmt = new Intl.NumberFormat("fi-FI", {
      minimumFractionDigits: 3,
      maximumFractionDigits: 3
    });
 
    const $ = (id) => document.getElementById(id);
 
    async function load() {
      $("status").textContent = "Haetaan…";
 
      const url = new URL(API_URL);
      if ($("nocache").checked) url.searchParams.set("nocache", "1");
      url.searchParams.set("cb", Date.now().toString()); // cache bust
 
      $("api").textContent = url.toString();
 
      try {
        const res = await fetch(url.toString(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
 
        const data = await res.json();
        const e = data.euribor || {};
 
        $("date").textContent = data.date || "—";
        $("v1m").textContent = (typeof e["1m"] === "number") ? fmt.format(e["1m"]) : "—";
        $("v3m").textContent = (typeof e["3m"] === "number") ? fmt.format(e["3m"]) : "—";
        $("v6m").textContent = (typeof e["6m"] === "number") ? fmt.format(e["6m"]) : "—";
        $("v12m").textContent = (typeof e["12m"] === "number") ? fmt.format(e["12m"]) : "—";
 
        $("status").textContent = "OK (" + (data.source || "lähde tuntematon") + ")";
      } catch (err) {
        $("status").textContent = "Virhe: " + err.message;
      }
    }
 
    $("refresh").addEventListener("click", load);
    window.addEventListener("load", load);
  </script>
 
</body>
</html>
