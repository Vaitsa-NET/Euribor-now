 
 
<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Euribor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<style>
body {
    margin: 0;
    background: #0f1115;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
 
.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}
 
.date {
    text-align: center;
    font-size: 18px;
    color: #cccccc;
    margin-bottom: 24px;
}
 
.card {
    background: #1a1d23;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
 
.term {
    font-size: 18px;
}
 
.value {
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>
 
<body>
<div class="container">
 
    <div class="date" id="date">Ladataan tietoja…</div>
 
    <div class="card">
        <div class="term">Euribor 1 kk</div>
        <div class="value" id="e1">–</div>
    </div>
 
    <div class="card">
        <div class="term">Euribor 3 kk</div>
        <div class="value" id="e3">–</div>
    </div>
 
    <div class="card">
        <div class="term">Euribor 6 kk</div>
        <div class="value" id="e6">–</div>
    </div>
 
    <div class="card">
        <div class="term">Euribor 12 kk</div>
        <div class="value" id="e12">–</div>
    </div>
 
</div>
 
<script>
/*
  Suomen Pankin avoin API.
  Haetaan viimeisin päiväkohtainen Euribor-rivi,
  jossa kaikki korot ovat samalla päivämäärällä.
*/
fetch(
  "https://api.boffsaopendata.fi/v1/euribor/last"
)
.then(response => response.json())
.then(data => {
    // Päivämäärä
    document.getElementById("date").textContent =
        "Päivämäärä: " + data.date;
 
    // Euribor-arvot
    document.getElementById("e1").textContent =
        data["1M"].toFixed(3) + " %";
    document.getElementById("e3").textContent =
        data["3M"].toFixed(3) + " %";
    document.getElementById("e6").textContent =
        data["6M"].toFixed(3) + " %";
    document.getElementById("e12").textContent =
        data["12M"].toFixed(3) + " %";
})
.catch(() => {
    document.getElementById("date").textContent =
        "Tietojen haku epäonnistui";
});
</script>
 
</body>
</html>
