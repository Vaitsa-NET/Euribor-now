<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euribor Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

#updated {
    color: #94a3b8;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 140px;
}

.rate {
    font-size: 26px;
    margin-top: 10px;
}

.change {
    font-size: 18px;
    margin-top: 8px;
}
</style>
</head>

<body>

<h1>Euribor korot</h1>
<p id="updated">Ladataan...</p>

<div class="container" id="rates"></div>

<script>
const series = {
    "1M": "EURIBOR1MD_",
    "3M": "EURIBOR3MD_",
    "6M": "EURIBOR6MD_",
    "12M": "EURIBOR1YD_"
};

// Proxy joka sallii API-haun selaimesta
const BASE_URL = "https://api.allorigins.win/raw?url=";

// ECB data endpoint (CSV)
function buildUrl(code) {
    return BASE_URL + encodeURIComponent(
        `https://sdw.ecb.europa.eu/quickviewexport.do?SERIES_KEY=FM.M.U2.EUR.RT.MM.${code}.HSTA&trans=N`
    );
}

async function fetchRate(code) {
    const res = await fetch(buildUrl(code));
    const text = await res.text();

    const rows = text.trim().split("\n");

    // viimeisin + edellinen
    const latest = rows[rows.length - 1].split(",");
    const prev = rows[rows.length - 2].split(",");

    return {
        date: latest[0],
        value: parseFloat(latest[1]),
        change: parseFloat(latest[1]) - parseFloat(prev[1])
    };
}

function getIndicator(change) {
    if (change > 0) return { arrow: "▲", color: "#ef4444" };
    if (change < 0) return { arrow: "▼", color: "#22c55e" };
    return { arrow: "→", color: "#94a3b8" };
}

async function load() {
    const container = document.getElementById("rates");
    container.innerHTML = "";

    let lastDate = "";

    for (const [label, code] of Object.entries(series)) {
        try {
            const data = await fetchRate(code);
            lastDate = data.date;

            const ind = getIndicator(data.change);

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h3>${label}</h3>
                <div class="rate">${data.value.toFixed(3)}%</div>
                <div class="change" style="color:${ind.color}">
                    ${ind.arrow} ${data.change.toFixed(3)}
                </div>
            `;

            container.appendChild(div);

        } catch (err) {
            console.error("Virhe:", err);
        }
    }

    document.getElementById("updated").innerText =
        "Viimeisin päivitys: " + lastDate;
}

load();

// päivitä 1h välein
setInterval(load, 3600000);
</script>

</body>
</html>
