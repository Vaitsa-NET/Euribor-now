<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euribor Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 140px;
}

.rate {
    font-size: 26px;
}

.change {
    font-size: 18px;
}
</style>
</head>

<body>

<h1>Euribor korot</h1>
<p id="updated">Ladataan...</p>

<div class="container" id="rates"></div>

<script>
async function fetchEuribor() {
    try {
        // Tämä endpoint toimii ilman CORS-ongelmia
        const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.euribor-rates.eu/en/current-euribor-rates/"));
        const data = await res.json();

        const html = data.contents;

        // Parsitaan arvot HTML:stä
        function extract(label) {
            const regex = new RegExp(label + ".*?(\\d+\\.\\d+)", "s");
            const match = html.match(regex);
            return match ? parseFloat(match[1]) : null;
        }

        return {
            date: new Date().toLocaleString(),
            rates: {
                "1M": extract("1 month"),
                "3M": extract("3 months"),
                "6M": extract("6 months"),
                "12M": extract("12 months")
            }
        };

    } catch (err) {
        console.error(err);
        return null;
    }
}

function render(data) {
    const container = document.getElementById("rates");
    container.innerHTML = "";

    Object.entries(data.rates).forEach(([key, value]) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${key}</h3>
            <div class="rate">${value ? value.toFixed(3) + "%" : "?"}</div>
            <div class="change">→</div>
        `;

        container.appendChild(div);
    });

    document.getElementById("updated").innerText =
        "Päivitetty: " + data.date;
}

async function load() {
    const data = await fetchEuribor();

    if (!data) {
        document.getElementById("updated").innerText = "Virhe datan haussa";
        return;
    }

    render(data);
}

load();
</script>

</body>
</html>
