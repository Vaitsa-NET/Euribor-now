<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Euribor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<style>
body {
    margin: 0;
    background: #0f1115;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
 
.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}
 
.date {
    text-align: center;
    font-size: 18px;
    color: #cccccc;
    margin-bottom: 24px;
}
 
.card {
    background: #1a1d23;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
 
.term {
    font-size: 18px;
}
 
.value {
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>
 
<body>
<div class="container">
 
    <div class="date" id="date">Ladataan tietoja…</div>
 
    <div class="card"><div class="term">Euribor 1 kk</div><div class="value" id="e1">–</div></div>
    <div class="card"><div class="term">Euribor 3 kk</div><div class="value" id="e3">–</div></div>
    <div class="card"><div class="term">Euribor 6 kk</div><div class="value" id="e6">–</div></div>
    <div class="card"><div class="term">Euribor 12 kk</div><div class="value" id="e12">–</div></div>
 
</div>
 
<script>
const series = {
  e1:  "M.U2.EUR.RT.MM.EURIBOR1MD_.HSTA",
  e3:  "M.U2.EUR.RT.MM.EURIBOR3MD_.HSTA",
  e6:  "M.U2.EUR.RT.MM.EURIBOR6MD_.HSTA",
  e12: "M.U2.EUR.RT.MM.EURIBOR12MD_.HSTA"
};
 
async function load(code) {
  const url =
    "https://data-api.ecb.europa.eu/service/data/FM/" +
    code +
    "?lastNObservations=1&format=jsondata";
 
  const res = await fetch(url);
  const json = await res.json();
 
  const seriesObj = json.dataSets[0].series;
  const seriesKey = Object.keys(seriesObj)[0];
  const obs = seriesObj[seriesKey].observations;
 
  const obsKey = Object.keys(obs)[0];
  const value = obs[obsKey][0];
 
  const timeDim =
    json.structure.dimensions.observation
      .find(d => d.id === "TIME_PERIOD");
 
  const date = timeDim.values[obsKey].name;
 
  return { value, date };
}
 
Promise.all(
  Object.entries(series).map(
    ([id, code]) => load(code).then(r => ({ id, ...r }))
  )
).then(results => {
  results.forEach(r => {
    document.getElementById(r.id).textContent =
      r.value.toFixed(3) + " %";
    document.getElementById("date").textContent =
      "Päivämäärä: " + r.date;
  });
}).catch(() => {
  document.getElementById("date").textContent =
    "Tietojen haku epäonnistui";
});
</script>
 
</body>
</html>
